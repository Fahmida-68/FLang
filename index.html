<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLang - Interactive Playground</title>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #0d1117; color: #c9d1d9; }
        .logo-font { font-family: 'Poppins', sans-serif; font-weight: 900; font-style: italic; color: #ff4511; }
        .code-font { font-family: 'Fira Code', monospace; }
        .bhailang-box { background-color: #161b22; border: 1px solid #30363d; border-radius: 6px; }
        .inline-code { background-color: #21262d; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; color: #ff7b72; font-size: 0.9em; }
        py-script-css-theme-error, .pyscript-alert, py-aside, div[style*="background-color: rgb(255, 204, 204)"] { 
            display: none !important; visibility: hidden !important; opacity: 0 !important; height: 0 !important; overflow: hidden !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto text-center mt-6 mb-10">
        <h1 class="text-6xl md:text-7xl logo-font tracking-wider mb-4 select-none">FLANG</h1>
        <p class="text-gray-400 text-base md:text-lg mb-6">A toy programming language written in Python</p>
        <div class="flex justify-center gap-4 mb-4">
            <button class="bg-[#ff4511] hover:bg-[#e03d0f] text-white font-bold px-6 py-2 rounded-md transition duration-200">Playground</button>
            <a href="https://github.com/Fahmida-68/FLang" target="_blank" class="bg-[#21262d] hover:bg-[#30363d] text-gray-200 border border-[#30363d] font-semibold px-6 py-2 rounded-md transition duration-200">View Source</a>
        </div>
        <p class="text-xs md:text-sm text-gray-500">Made by <span class="text-[#ff4511] font-mono">antanafahmida2013@gmail.com</span></p>
    </div>

    <div class="max-w-5xl mx-auto">
        <div class="bg-[#161b22] border border-[#30363d] rounded-lg shadow-2xl overflow-hidden mb-6">
            <div class="bg-[#21262d] px-4 py-3 flex justify-between items-center border-b border-[#30363d]">
                <span class="font-bold text-xs tracking-wider text-gray-400 uppercase">PLAYGROUND</span>
                <div class="flex gap-2">
                    <button id="run-btn" class="bg-[#ff4511] hover:bg-[#e03d0f] text-white font-bold px-5 py-1.5 rounded transition text-sm">Run</button>
                    <button id="clear-btn" class="bg-gray-700 hover:bg-gray-600 text-gray-200 font-semibold px-5 py-1.5 rounded transition text-sm">Clear</button>
                </div>
            </div>
            <textarea id="code-input" class="w-full h-64 bg-[#0d1117] text-gray-100 p-4 font-mono focus:outline-none resize-none code-font text-sm md:text-base" spellcheck="false">shuru flang
    bol "Hello World"
    rakho a = 3
    rakho b = 0
    jotokkhon (b < 5) {
        bol b
        jodi (b == a) {
            bol "b is equal to a"
        } natho (b == 0) {
            bol "b is equal to zero"
        }
        b = b + 1
    }
shesh flang</textarea>
        </div>

        <div class="bg-[#161b22] border border-[#30363d] rounded-lg p-4 mb-16">
            <h3 class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">OUTPUT LOG WINDOW</h3>
            <pre id="output-box" class="code-font text-sm md:text-base bg-[#0d1117] p-4 rounded text-gray-300 min-h-[100px] whitespace-pre-wrap">Output log sequence idle ...</pre>
        </div>
    </div>

    <script type="py" config='{"files": [{"from": "tokens.py?v=200", "to": "tokens.py"}, {"from": "lexer.py?v=200", "to": "lexer.py"}, {"from": "parser.py?v=200", "to": "parser.py"}, {"from": "interpreter.py?v=200", "to": "interpreter.py"}, {"from": "main.py?v=200", "to": "main.py"}]}'>
from pyscript import document
from pyscript import window
import sys

def execute_playground(event=None):
    output_element = document.querySelector("#output-box")
    output_element.style.color = "#9ca3af"
    output_element.innerText = "Compiling and executing..."
    try:
        for mod in ['main', 'lexer', 'parser', 'interpreter', 'tokens']:
            if mod in sys.modules: del sys.modules[mod]
        import main
        input_text = document.querySelector("#code-input").value
        result = main.run_code(input_text)
        if "[Compiler Error]" in str(result) or "[Runtime Error]" in str(result):
            output_element.style.color = "#ff6b6b"
        else:
            output_element.style.color = "#4ade80"
        output_element.innerText = str(result)
    except Exception as e:
        output_element.style.color = "#ff6b6b"
        output_element.innerText = f"[Internal Python Error]: {str(e)}"

def clear_playground(event=None):
    output_element = document.querySelector("#output-box")
    output_element.style.color = "#9ca3af"
    output_element.innerText = "Output log sequence idle ..."

window.execute_playground = execute_playground
window.clear_playground = clear_playground
document.querySelector("#run-btn").onclick = execute_playground
document.querySelector("#clear-btn").onclick = clear_playground
    </script>
</body>
</html>
